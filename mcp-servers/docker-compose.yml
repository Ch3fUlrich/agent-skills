# Mem0 Self-Hosted Stack — Docker Compose (DeepSeek + Ollama)
#
# Stands up the full mem0 memory stack:
#   1. PostgreSQL 17 + pgvector (vector database)
#   2. Mem0 REST API server (DeepSeek via OpenAI-compatible API + Ollama embedder)
#   3. Mem0 MCP bridge (SSE transport for codewhale / Claude Code)
#   4. Mem0 Dashboard (Next.js web UI)
#
# Required: DEEPSEEK_API_KEY in .env + Ollama running locally with bge-m3.
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose down               # Stop, preserve data
#   docker compose down -v            # Stop, destroy all data
#   docker compose ps                 # Check status
#   docker compose logs mem0          # View API logs
#
# API docs:      http://localhost:8888/docs
# Dashboard:     http://localhost:3000
# MCP SSE:       http://localhost:8001/sse

name: mem0-stack

services:
  # ─── PostgreSQL 17 + pgvector ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mem0-postgres
    restart: unless-stopped
    shm_size: "128mb"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d postgres -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - mem0-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Mem0 REST API Server (custom: DeepSeek + Ollama providers) ──────────
  mem0:
    build:
      context: ./servers/mem0-custom
    container_name: mem0-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=postgres
      - MEM0_TELEMETRY=${MEM0_TELEMETRY:-false}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      # LLM via DeepSeek's OpenAI-compatible API (no custom provider needed)
      - OPENAI_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_BASE_URL=${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}
      - LLM_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      # Embedder via local Ollama
      - EMBEDDER_PROVIDER=ollama
      - EMBEDDER_MODEL=${OLLAMA_EMBED_MODEL:-bge-m3}
      - OLLAMA_BASE_URL=${OLLAMA_EMBED_URL:-http://host.docker.internal:11434}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8888:8000"
    volumes:
      - ./data/mem0-history:/app/history
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mem0-net
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Mem0 MCP Bridge (SSE transport for AI agents) ────────────────────────
  mem0-mcp:
    build:
      context: ./servers/mem0-mcp
    container_name: mem0-mcp
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MEM0_API_URL=http://mem0:8000
      - MEM0_USER_ID=${MEM0_USER_ID:-mauls}
      - PORT=8001
    depends_on:
      mem0:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - mem0-net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',8001)); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Mem0 Dashboard (Next.js web UI) ──────────────────────────────────────
  mem0-dashboard:
    build:
      context: ./servers/mem0-dashboard
    container_name: mem0-dashboard
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8888
      - API_INTERNAL_URL=http://mem0:8000
      - NEXT_PUBLIC_INSTANCE_NAME=Mem0
    depends_on:
      mem0:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - mem0-net
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  mem0-net:
    driver: bridge
