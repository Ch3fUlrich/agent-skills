# Self-Hosted MCP Memory Stack — Docker Compose
#
# The stack (structured cross-project memory):
#   1. omnigraph-server — lakehouse-native graph engine (Axum HTTP on :8080)
#   2. minio            — S3-compatible object store backing Omnigraph
#   3. minio-init       — one-shot: creates the Omnigraph bucket
#   4. omnigraph-init   — one-shot: converges cluster/ into the S3 storage root
#   5. omnigraph-seed   — one-shot: merge-loads each cluster/seed/<g>.jsonl into graph <g>
#   6. omnigraph-viewer — read-only web UI (127.0.0.1:8090)
#
# Omnigraph is the memory layer, with no fallback: the Mem0 stack was removed
# (ADR 0003; ADR 0001 has the original rationale). Nothing here depends on
# Postgres/pgvector or an LLM API key any more.
#
# Usage:
#   docker compose up -d                          # the whole stack
#   docker compose down                           # stop, preserve data
#   docker compose down -v                        # stop, remove named volumes
#   NOTE: MinIO data is a bind mount (./data/minio), NOT a named volume, so it
#   survives `down -v`. To wipe all graph/memory data: also rm -rf ./data/minio
#
# Omnigraph API:  http://localhost:8080/healthz
# MinIO console:  http://localhost:9001
# Viewer:         http://localhost:8090

name: mcp-server

services:
  # ─── MinIO — S3-compatible object store (Omnigraph storage backend) ────────
  minio:
    image: minio/minio:latest
    container_name: omnigraph-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - ./data/minio:/data
    ports:
      # Host ports only; Omnigraph reaches MinIO over the internal network.
      # Override in .env.server if 9000/9001 are taken on your host.
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"       # S3 API
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"   # web console
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── one-shot: create the Omnigraph bucket, then exit ─────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: omnigraph-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${S3_BUCKET} &&
      echo 'bucket $${S3_BUCKET} ready'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-omnigraph}
    networks:
      - mcp-net
    restart: "no"

  # ─── one-shot: converge the cluster into the S3 storage root, then exit ────
  #   Writes the state ledger the server boots from. Declared config lives in
  #   ./cluster (git); state lives in MinIO (the Terraform split).
  omnigraph-init:
    image: modernrelay/omnigraph-server:v0.8.1
    container_name: omnigraph-init
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    entrypoint: ["sh", "-c", "if omnigraph cluster import --config /cluster --yes; then echo 'fresh store: applying cluster config'; omnigraph cluster apply --config /cluster --yes --as default; else echo 'existing store: skipping apply (run apply manually for config changes)'; fi"]
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ENDPOINT_URL_S3=http://minio:9000
      - AWS_ALLOW_HTTP=true
      - AWS_S3_FORCE_PATH_STYLE=true
    volumes:
      - ./cluster:/cluster:ro
    networks:
      - mcp-net
    restart: "no"

  # ─── Omnigraph server — graph + vector + full-text memory engine ──────────
  omnigraph-server:
    image: modernrelay/omnigraph-server:v0.8.1
    container_name: omnigraph-server
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      omnigraph-init:
        condition: service_completed_successfully
    environment:
      - OMNIGRAPH_BIND=0.0.0.0:8080
      # Cluster boot source: the S3 storage-root URI on MinIO.
      - OMNIGRAPH_CLUSTER=s3://${S3_BUCKET:-omnigraph}/cluster
      # Single bearer token for the implicit `default` actor.
      - OMNIGRAPH_SERVER_BEARER_TOKEN=${OMNIGRAPH_TOKEN:?Set OMNIGRAPH_TOKEN in .env}
      # S3 (MinIO) contract — see Omnigraph docs/user/deployment.md
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ENDPOINT_URL_S3=http://minio:9000
      - AWS_ALLOW_HTTP=true
      - AWS_S3_FORCE_PATH_STYLE=true
      # Embedding provider (Ollama on cloud.vm) — dummy key; Ollama ignores it.
      - OLLAMA_DUMMY_KEY=${OLLAMA_DUMMY_KEY:-ollama}
    extra_hosts:
      # Resolve the LAN Ollama host from inside the container.
      - "cloud.vm:${OLLAMA_HOST_IP:-192.168.178.159}"
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Omnigraph memory viewer (read-only web UI) ───────────────────────────
  #   Holds the bearer server-side; put Authelia in front when exposed.
  #   Local: http://127.0.0.1:8090 . Deployed instance: see
  #   Server/server/coding/mcp-servers/docker-compose.yml (coding.vm).
  # SELF-HEALING memory backstop. After the server is healthy, merge-load each
  # seed into THE GRAPH NAMED AFTER ITS FILE (per-project isolation — cluster.yaml
  # declares one graph per repo; `memory.jsonl` carries the global-scope
  # Preferences). Idempotent by @key slug — merge never duplicates, only fills
  # what's missing — so even a wiped MinIO volume repopulates from the versioned
  # seed, and it is a harmless no-op when the store is intact.
  #
  # A failing seed EXITS NONZERO rather than warning-and-continuing: silent
  # failures are how the relational-edge lines (Tracks/Affects/…) went unnoticed
  # against a stale schema. $$f/$$g are escaped so compose leaves the shell loop
  # variables alone (the bug that broke the old init guard).
  omnigraph-seed:
    image: modernrelay/omnigraph-server:v0.8.1
    container_name: omnigraph-seed
    depends_on:
      omnigraph-server: { condition: service_healthy }
    entrypoint: ["sh", "-c", "rc=0; for f in /cluster/seed/*.jsonl; do g=$$(basename \"$$f\" .jsonl); echo \"seeding $$f -> graph $$g\"; omnigraph load --server http://omnigraph-server:8080 --graph \"$$g\" --data \"$$f\" --mode merge --yes || { echo \"ERROR: seed $$f -> graph $$g FAILED\"; rc=1; }; done; echo 'omnigraph-seed complete'; exit $$rc"]
    environment:
      - OMNIGRAPH_BEARER_TOKEN=${OMNIGRAPH_TOKEN:?set in .env.shared}
    volumes:
      # Same relative mount omnigraph-init uses — compose resolves it from this
      # file's directory, so no AGENT_SKILLS_* var (and no personal-path default).
      - ./cluster:/cluster:ro
    networks:
      - mcp-net
    restart: "no"

  omnigraph-viewer:
    build:
      context: ./servers/omnigraph-viewer
    container_name: omnigraph-viewer
    restart: unless-stopped
    depends_on:
      omnigraph-server:
        condition: service_healthy
    environment:
      - OMNIGRAPH_URL=http://omnigraph-server:8080
      - OMNIGRAPH_TOKEN=${OMNIGRAPH_TOKEN:?Set OMNIGRAPH_TOKEN in .env}
      - OMNIGRAPH_GRAPH=memory
    ports:
      - "127.0.0.1:8090:8090"
    networks:
      - mcp-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ═══════════════════════════════════════════════════════════════════════════
  #  OBSERVABILITY: Sentry & Datadog Proxy — starts with `--profile observability`
  # ═══════════════════════════════════════════════════════════════════════════

  # ─── Datadog Agent (Local Proxy) ───────────────────────────────────────────
  # Acts as a local telemetry forwarder for distributed setups.
  datadog-agent:
    image: datadog/agent:latest
    container_name: datadog-agent
    profiles: ["observability"]
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    restart: "no"

  # ─── Self-Hosted Sentry Backend (Placeholder) ──────────────────────────────
  # Full self-hosted Sentry requires 20+ containers (Kafka, Clickhouse, etc.).
  # It is excluded from this single compose file. If using a local Sentry
  # installation, point the client MCP to it via SENTRY_HOST override.
  
networks:
  mcp-net:
    driver: bridge
