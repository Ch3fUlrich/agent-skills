# Omnigraph cluster — declared as code (versioned in git; state lives in S3/MinIO).
# `omnigraph cluster apply --config .` converges this into the storage root below,
# writing the state ledger the server boots from (`omnigraph-server --cluster <root>`).
# See skills/structured-memory/references/schema.md for the memory model.
version: 1
metadata:
  name: mcp-memory

# Whole cluster (state ledger, lock, catalog, graph roots) lives on MinIO.
# Credentials come from the standard AWS_* env contract, never from this file.
storage: s3://omnigraph/cluster

state:
  backend: cluster
  lock: true

# Query-time embedding provider. Real vector search via Ollama on cloud.vm
# (nomic-embed-text = 768 dims, matches Vector(768) in memory.pg). Ollama ignores
# the api_key but openai-compatible requires the field, so a dummy env is used.
# Falls back conceptually to `mock` if cloud.vm is unavailable (swap kind: mock).
providers:
  embedding:
    default:
      kind: openai-compatible
      base_url: http://cloud.vm:11434/v1
      model: nomic-embed-text
      api_key: ${OLLAMA_DUMMY_KEY}

# PROJECT ISOLATION: `memory` is the shared / global-scope graph (cross-project
# Preferences, legacy home). Each project ALSO gets its own graph so a
# `load mode: overwrite` in one project can never truncate another's data — the
# failure mode that wiped everything before. Add a project = add an entry here
# (or run scripts/add-project-graph.sh) then re-apply (scripts/apply-cluster.sh).
# All graphs share the one memory.pg schema + the same embedding provider.
graphs:
  memory:
    schema: memory.pg
    embedding_provider: default
    queries: queries/
  agent-skills:
    schema: memory.pg
    embedding_provider: default
    queries: queries/
  invest:
    schema: memory.pg
    embedding_provider: default
    queries: queries/
  basic-analysis:
    schema: memory.pg
    embedding_provider: default
    queries: queries/
  homelab-server:
    schema: memory.pg
    embedding_provider: default
    queries: queries/

policies:
  cluster-admin:
    file: cluster.policy.yaml
    applies_to: [cluster]
  memory-access:
    file: memory.policy.yaml
    applies_to: [memory]
  # Same operator grant, applied to every per-project graph. Extend applies_to
  # when you add a project graph above.
  project-graphs-access:
    file: project-graphs.policy.yaml
    applies_to: [agent-skills, invest, basic-analysis, homelab-server]
  # MULTI-USER (template, off by default — enabling needs per-user bearer tokens,
  # which are an admin/cluster-apply step). See users.policy.yaml.example.
  # users-access:
  #   file: users.policy.yaml
  #   applies_to: [memory, agent-skills, invest, basic-analysis, homelab-server]
