version: 1

# Per-project graph bundle. Same operator grant as memory.policy.yaml, but bound
# (via cluster.yaml `applies_to`) to the isolated per-project graphs. The single
# `default` actor (the shared bearer token) operates every project graph; add
# per-user actors here — or better, in users.policy.yaml — to scope access.
groups:
  operators: [default]

rules:
  - id: operators-project-access
    allow:
      actors: { group: operators }
      actions: [read, export, change, schema_apply, branch_create, branch_delete, branch_merge, invoke_query]
